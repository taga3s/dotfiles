"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](fg:#769ff0)\
$directory\
$git_branch\
$git_status\
$nodejs\
$golang\
$terraform\
$time\
[](fg:#1d2230)\
$cmd_duration\
\n$character"""

add_newline = false

[character]
success_symbol = '[❯](bold #bbbbbb)'
error_symbol = '[✗](bold red)'

[cmd_duration]
min_time = 0
format = "[ $duration ]($style)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "../"

[git_branch]
symbol = "⎇"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
disabled = true

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#417e38 bg:#c5e5b4)]($style)'

[golang]
symbol = ""
style = "bg:#007d9c"
format = '[[ $symbol ($version) ](fg:#5dc9e2 bg:#007d9c)]($style)'

# [terraform]
# symbol = "  "
# style = "bold 105"
# format = '[ $symbol $workspace]($style)'

[package]
disabled = true

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[   $time ](fg:#a0a9cb bg:#1d2230)]($style)'
