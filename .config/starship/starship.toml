"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$terraform\
$time\
$cmd_duration\
\n$character"""

add_newline = false

[character]
# format = "?"

[cmd_duration]
min_time = 0
format = "[ $duration ]($style)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
